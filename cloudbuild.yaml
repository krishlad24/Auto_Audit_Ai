steps:
  # Step 1: A simple "Hello World" to test the connection
  - name: 'python:3.10-slim'
    entrypoint: 'bash'
    args: ['-c', 'echo "Google Cloud Build is connected to GitHub!"']

  # Step 2: Run a basic syntax check (Linter)
  - name: 'python:3.10-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

options:
  logging: CLOUD_LOGGING_ONLY
